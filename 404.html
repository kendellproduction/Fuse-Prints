<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Fuse Prints</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT:'#2196F3', light:'#64B5F6' }, surface: { 400:'#020202' } }, fontFamily: { display: ['"Clash Display"','system-ui','sans-serif'], body: ['"General Sans"','system-ui','sans-serif'] } } } }
  </script>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet" />
  <style>
    body{font-family:'General Sans',system-ui,sans-serif;background:#020202;color:#FAFAFA;margin:0;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:24px}
    h1{font-family:'Clash Display',system-ui,sans-serif}
    .gradient-text{background:linear-gradient(135deg,#64B5F6 0%,#2196F3 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  </style>
</head>
<body>
  <div class="max-w-xl">
    <img src="/assets/logo-white.png" alt="Fuse Prints" class="h-10 w-auto mx-auto mb-10 opacity-80" />
    <p class="text-brand text-[11px] font-semibold tracking-[.3em] uppercase mb-4">404 — Lost in Print</p>
    <h1 class="font-display font-bold text-6xl sm:text-8xl tracking-[-.03em] leading-[.9] mb-6">
      <span class="gradient-text">Off the press,</span><br/>off the page.
    </h1>
    <p class="text-white/40 text-base sm:text-lg leading-relaxed mb-10">The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>
    <div class="flex flex-wrap gap-3 justify-center">
      <a href="/" class="inline-flex items-center gap-3 bg-brand text-white font-display font-semibold text-sm uppercase tracking-[.1em] px-7 py-4 rounded-full hover:bg-brand-light transition-all">
        Back to Home
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="-rotate-45"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
      <a href="/#contact" class="inline-flex items-center gap-3 border border-white/15 text-white font-display font-semibold text-sm uppercase tracking-[.1em] px-7 py-4 rounded-full hover:border-white/40 transition-all">
        Get a Quote
      </a>
    </div>
  </div>
</body>
</html>
